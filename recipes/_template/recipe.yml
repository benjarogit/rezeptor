# Vorlage — nicht im offiziellen Manifest. Kopieren mit: ./scripts/new-recipe.sh meine-app
id: example-app
schema_version: 1
icon: "{repo}/images/rezeptor-icon.svg"
name: "Example App (Template)"
author: ""
category: "Vorlage"
version_guaranteed: "1.0.0"
version_label: "Example 1.0.0"
version_detect:
  - kind: pe_field
    glob: "*.exe"
    field: FileVersion
  - kind: pe_field
    glob: "**/*.exe"
    field: ProductVersion
  - kind: path_regex
    regex: "(?i)[_-]v?([0-9]+(?:\\.[0-9]+){1,3})"
notify_title: ""
data_root: "~/.local/share/wine-software/example-app"
prefix: "{data_root}/prefix"
runtime: proton-ge
install_type: portable_launch
deploy_mode: copy
target_default: "~/Dokumente/Example App"
target_label: "Zielordner (Portable wird dorthin installiert)"
source_kind: folder
source_label: "Quelle (Ordner oder Archiv)"
source_formats: zip,tar.gz,tgz,7z,rar
fix_kind: optional
exe_glob: "**/*.exe"
# Optional: process names for “app is running” detection (else derived from exe_glob)
# launch_process_patterns: [App.exe]
winetricks: [win10, vcrun2019]
env:
  WINEDEBUG: "-all"
validate: validate.sh
launch: launch.sh
install: install.sh
repair: repair.sh
kill: kill.sh
uninstall: uninstall.sh
install_steps:
  - prepare_source
  - require_portable
  - prefix
  - winetricks
