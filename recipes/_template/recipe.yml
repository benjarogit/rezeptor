# Vorlage — nicht im offiziellen Manifest. Kopieren mit: ./scripts/new-recipe.sh meine-app
id: example-app
name: "Example App (Template)"
category: "Vorlage"
version_guaranteed: "1.0.0"
version_label: "Example 1.0.0"
data_root: "~/.local/share/wine-software/example-app"
prefix: "{data_root}/prefix"
runtime: proton-ge
install_type: portable_launch
deploy_mode: copy
target_default: "~/Dokumente/Example App"
target_label: "Zielordner (Portable wird dorthin installiert)"
source_kind: folder
source_label: "Quelle (Ordner oder Archiv)"
source_formats: zip,tar.gz,tgz
fix_kind: optional
exe_glob: "**/*.exe"
winetricks: [win10, vcrun2019]
env:
  WINEDEBUG: "-all"
validate: validate.sh
launch: launch.sh
install: install.sh
repair: repair.sh
kill: kill.sh
uninstall: uninstall.sh
install_steps:
  - prepare_source
  - require_portable
  - prefix
  - winetricks
