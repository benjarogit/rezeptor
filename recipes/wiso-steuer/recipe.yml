id: wiso-steuer
schema_version: 1
icon: "{repo}/images/wiso-steuer-icon.png"
name: "WISO Steuer (Portable)"
author: "benjarogit"
category: "Finanzen & Steuer"
version_guaranteed: "33.05.3220"
version_label: "WISO Steuer 2026 (Portable 33.05 Build 3220)"
version_detect:
  - kind: text_regex
    glob: "**/wcrc32list*.txt"
    regex: "(?i)^VERSION\\s*=\\s*(.+)$"
  - kind: path_regex
    regex: "WISO\\.([0-9]+(?:\\.[0-9]+){0,3})\\.Portable$"
  - kind: pe_field
    glob: "**/wiso*.exe"
    field: ProductVersion
  - kind: pe_field
    glob: "start.exe"
    field: FileVersion
  - kind: pe_field
    glob: "**/start.exe"
    field: ProductVersion
notify_title: "WISO Steuer"
data_root: "~/.local/share/wine-software/wiso-steuer"
prefix: "{data_root}/prefix"
runtime: proton-ge
install_type: portable_launch
deploy_mode: copy
target_default: "~/Dokumente/WISO Steuer 2026"
target_label: "Zielordner (Portable wird dorthin installiert)"
source_kind: folder
source_label: "Quelle (Ordner oder Archiv mit start.exe / Steuersoftware 20XX)"
source_formats: zip,tar.gz,tgz,7z,rar
fix_kind: none
portable_root: ""
exe_glob: "**/wiso*.exe"
launch_process_patterns: [wiso2026.exe, wmain26.exe]
winetricks: [vcrun2019, dotnet48, corefonts, tahoma, calibri, d3dcompiler_47, gdiplus, "fontsmooth=rgb"]
env:
  WINEARCH: win64
validate: validate.sh
launch: launch.sh
install: install.sh
repair: repair.sh
kill: kill.sh
uninstall: uninstall.sh
# Referenz-Beispiel: vollständige deklarative install_steps-Zerlegung
install_steps:
  - prepare_source
  - module: recipe_wiso::after_prepare
  - prefix
  - module: recipe_wiso::apply_wined3d
  - module: recipe_wiso::deploy_portable_launcher
  - module: recipe_wiso::apply_qt_network_fix
  - stabilize_prefix
  - winetricks: [vcrun2019, dotnet48, corefonts, tahoma, calibri, d3dcompiler_47, gdiplus, "fontsmooth=rgb"]
  - win10
  - module: recipe_wiso::optional_vc_redist
  - module: recipe_wiso::optional_patch_exe
  - module: recipe_wiso::optional_fix_root
  - module: recipe_wiso::ensure_x11_driver
  - module: recipe_wiso::apply_ui_layout_fix
  - fonts_registry
  # Desktop/Menü: nach Install in der GUI abgefragt (recipe_desktop::install)
