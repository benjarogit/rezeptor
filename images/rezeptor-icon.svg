<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Rezeptor">
  <!-- Brand: Anthrazit #1C1C1A · Kupfer #B87333 · Pergament #EDE6D6 -->
  <defs>
    <linearGradient id="seal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C9843F"/>
      <stop offset="100%" stop-color="#A8652A"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- App tile -->
  <rect width="512" height="512" rx="112" fill="#1C1C1A"/>

  <!-- Recipe card -->
  <g filter="url(#soft)">
    <rect x="128" y="96" width="232" height="300" rx="22" fill="#EDE6D6"/>
    <!-- copper header strip -->
    <rect x="128" y="96" width="232" height="36" rx="22" fill="#B87333"/>
    <rect x="128" y="114" width="232" height="18" fill="#B87333"/>
    <!-- lines -->
    <rect x="156" y="168" width="176" height="14" rx="7" fill="#1C1C1A" opacity="0.78"/>
    <rect x="156" y="206" width="176" height="14" rx="7" fill="#1C1C1A" opacity="0.55"/>
    <rect x="156" y="244" width="132" height="14" rx="7" fill="#1C1C1A" opacity="0.40"/>
    <rect x="156" y="282" width="156" height="14" rx="7" fill="#1C1C1A" opacity="0.28"/>
  </g>

  <!-- Verified seal -->
  <circle cx="352" cy="352" r="88" fill="#1C1C1A"/>
  <circle cx="352" cy="352" r="74" fill="url(#seal)"/>
  <path d="M312 354 L340 382 L400 318" fill="none" stroke="#1C1C1A" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
