app-id: io.github.benjarogit.Rezeptor
runtime: org.freedesktop.Platform
runtime-version: &runtime-version '25.08'
sdk: org.freedesktop.Sdk
command: rezeptor-launch

# Proton/winetricks need real 32-bit wine (syswow64 / msxml3). The FDO
# Platform is 64-bit only — pull Compat.i386 (+ GL32) like org.winehq.Wine.
x-gl-version: &gl-version '1.4'
x-gl-versions: &gl-versions 25.08;25.08-extra;1.4
x-gl-merge-dirs: &gl-merge-dirs vulkan/icd.d;glvnd/egl_vendor.d;egl/egl_external_platform.d;OpenCL/vendors;lib/dri;lib/d3d;lib/gbm;vulkan/explicit_layer.d;vulkan/implicit_layer.d;vdpau

finish-args:
  # GUI
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  # Wine/Proton guests (GPU, input, shm)
  - --device=all
  - --allow=devel
  - --allow=multiarch
  - --share=network
  # User data (~/.local/share/wine-software) + BYOS installer folders
  - --filesystem=home
  # Dolphin/SMB/GVFS: xdg-run/gvfs only — never bind all of /run/user
  # (ro on /run/user breaks bwrap flatpak-info and flatpak-builder --run)
  - --filesystem=xdg-run/gvfs:ro
  # Common host mounts (USB, virtiofs, manual smb)
  - --filesystem=/mnt:ro
  - --filesystem=/media:ro
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.portal.Desktop
  - --talk-name=org.freedesktop.portal.FileChooser

add-extensions:
  org.freedesktop.Platform.Compat.i386:
    directory: lib/i386-linux-gnu
    version: *runtime-version
  org.freedesktop.Platform.Compat.i386.Debug:
    directory: lib/debug/lib/i386-linux-gnu
    version: *runtime-version
    no-autodownload: true
  org.freedesktop.Platform.GL32:
    directory: lib/i386-linux-gnu/GL
    version: *gl-version
    versions: *gl-versions
    subdirectories: true
    no-autodownload: true
    autodelete: false
    add-ld-path: lib
    merge-dirs: *gl-merge-dirs
    download-if: active-gl-driver
    enable-if: active-gl-driver
    autoprune-unless: active-gl-driver

modules:
  - name: cabextract
    buildsystem: autotools
    config-opts:
      - --disable-static
    sources:
      - type: archive
        url: http://deb.debian.org/debian/pool/main/c/cabextract/cabextract_1.11.orig.tar.gz
        sha256: b5546db1155e4c718ff3d4b278573604f30dd64c3c5bfd4657cd089b823a3ac6

  - name: rezeptor
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
      strip: false
      no-debuginfo: true
    build-commands:
      - bash flatpak/build-app.sh
    sources:
      - type: dir
        path: ..
        skip:
          - .git
          - .cache
          - AppDir-build
          - squashfs-root
          - '*.AppImage'
          - '*.flatpak'
          - flatpak/.flatpak-builder
          - flatpak/build-flatpak
          - flatpak/repo
          - rezeptor-*.tar.gz
          - SHA256SUMS
          - photoshop/Set-up.exe
          - photoshop/packages
          - photoshop/products
          - site
          - .cursor
      - type: archive
        url: https://github.com/GloriousEggroll/proton-ge-custom/releases/download/GE-Proton10-28/GE-Proton10-28.tar.gz
        sha256: 4c5cc46e7f1af53f610e02c60bc9470db0d82e072b0072372ef588a82c4de316
        dest: proton-ge-src
      - type: archive
        url: https://github.com/astral-sh/python-build-standalone/releases/download/20251217/cpython-3.12.12%2B20251217-x86_64-unknown-linux-gnu-install_only_stripped.tar.gz
        sha256: 9f5474351378aeca746ee8a2ff3b187edec71d791ef92827eca14ab5b0e15441
        dest: python-src
      - type: file
        url: https://raw.githubusercontent.com/Winetricks/winetricks/master/src/winetricks
        sha256: 954d17f56ae5f4d32eb083193a4a838c73ae5ff6b91765d93b0eab59cf2e7d29
        dest: winetricks-src
