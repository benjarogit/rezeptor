name: Release

# Auslöser:
#   - VERSION auf main ändern → Validate + Paket + AppImage + Checksums + GitHub Release
#   - Tag v* pushen (manuell)
#   - workflow_dispatch (Rebuild / Notfall)
#
# Assets pro Release:
#   - rezeptor-X.Y.Z.tar.gz          (Quell-/Setup-Paket)
#   - rezeptor-X.Y.Z-x86_64.AppImage (portable)
#   - SHA256SUMS                     (Prüfung: sha256sum -c SHA256SUMS)
on:
  push:
    branches: [main, master]
    paths: [VERSION]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      force:
        description: 'Rebuild even if release already has complete assets'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      skip: ${{ steps.skip.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version / tag
        id: meta
        run: |
          set -euo pipefail
          ver="$(tr -d '[:space:]' < VERSION)"
          if [[ ! "$ver" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9.]+)?$ ]]; then
            echo "VERSION invalid: '$ver'" >&2
            exit 1
          fi
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            tag="${GITHUB_REF_NAME}"
            tag_ver="${tag#v}"
            if [ "$ver" != "$tag_ver" ]; then
              echo "VERSION ($ver) != tag ($tag_ver)" >&2
              exit 1
            fi
          else
            tag="v${ver}"
          fi
          echo "version=${ver}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Release target: ${tag} (VERSION ${ver})"

      - name: Skip if complete assets already published
        id: skip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE: ${{ github.event_name == 'workflow_dispatch' && inputs.force }}
          VER: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          tag="${{ steps.meta.outputs.tag }}"
          if [ "${FORCE}" = "true" ]; then
            echo "Force rebuild requested."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          names="$(gh release view "$tag" --json assets -q '.assets[].name' 2>/dev/null || true)"
          need_app="rezeptor-${VER}-x86_64.AppImage"
          need_tar="rezeptor-${VER}.tar.gz"
          need_sum="SHA256SUMS"
          ok=true
          echo "$names" | grep -qxF "$need_app" || ok=false
          echo "$names" | grep -qxF "$need_tar" || ok=false
          echo "$names" | grep -qxF "$need_sum" || ok=false
          if [ "$ok" = true ]; then
            echo "Release ${tag} already complete — skip."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Missing assets (need AppImage + tar.gz + SHA256SUMS) — build."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install tools
        if: steps.skip.outputs.skip != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck bats python3-yaml

      - name: Shellcheck
        if: steps.skip.outputs.skip != 'true'
        run: make shellcheck

      - name: Bash syntax
        if: steps.skip.outputs.skip != 'true'
        run: make syntax

      - name: Python compile
        if: steps.skip.outputs.skip != 'true'
        run: make compile

      - name: Recipe structure
        if: steps.skip.outputs.skip != 'true'
        run: make recipes-check

      - name: Recipe lint
        if: steps.skip.outputs.skip != 'true'
        run: make recipe-lint

      - name: Recipe manifest
        if: steps.skip.outputs.skip != 'true'
        run: make recipe-manifest-check

      - name: Bats tests
        if: steps.skip.outputs.skip != 'true'
        run: make test

  release:
    needs: validate
    if: needs.validate.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            curl tar rsync fuse libfuse2 cabextract \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 \
            libxcb-cursor0 libfontconfig1
          mkdir -p .cache/appimagetool
          curl -fsSL -o .cache/appimagetool/appimagetool-x86_64.AppImage \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x .cache/appimagetool/appimagetool-x86_64.AppImage

      - name: Build source package (tar.gz)
        run: |
          set -euo pipefail
          chmod +x scripts/build-release-package.sh
          scripts/build-release-package.sh
          test -f "rezeptor-${{ needs.validate.outputs.version }}.tar.gz"

      - name: Build AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          set -euo pipefail
          chmod +x scripts/build-appimage.sh AppDir/AppRun
          scripts/build-appimage.sh
          shopt -s nullglob
          files=(rezeptor-*-x86_64.AppImage)
          if [ "${#files[@]}" -ne 1 ]; then
            echo "Expected exactly one AppImage, got: ${#files[@]}" >&2
            ls -la rezeptor-*.AppImage 2>/dev/null || true
            exit 1
          fi
          ls -lh "${files[0]}"

      - name: Write SHA256SUMS
        run: |
          set -euo pipefail
          ver="${{ needs.validate.outputs.version }}"
          # SHA256 (stärker als MD5) — prüfen mit: sha256sum -c SHA256SUMS
          sha256sum \
            "rezeptor-${ver}.tar.gz" \
            "rezeptor-${ver}-x86_64.AppImage" \
            | tee SHA256SUMS
          cat SHA256SUMS

      - name: Publish GitHub Release + notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.validate.outputs.tag }}
          VER: ${{ needs.validate.outputs.version }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          assets=(
            "rezeptor-${VER}.tar.gz"
            "rezeptor-${VER}-x86_64.AppImage"
            "SHA256SUMS"
          )
          for f in "${assets[@]}"; do
            [ -f "$f" ] || { echo "Missing $f" >&2; exit 1; }
          done

          prev="$(gh release list --limit 20 --json tagName,isLatest \
            -q "[.[] | select(.tagName != \"${TAG}\")][0].tagName" 2>/dev/null || true)"
          if [ -z "${prev}" ]; then
            prev="$(git describe --tags --abbrev=0 "${SHA}^" 2>/dev/null || true)"
          fi

          notes="$(gh api "repos/${REPO}/releases/generate-notes" \
            -f tag_name="$TAG" \
            -f target_commitish="$SHA" \
            ${prev:+-f previous_tag_name="$prev"} \
            --jq .body 2>/dev/null || true)"

          if [ -z "${notes}" ] || [ "${#notes}" -lt 120 ]; then
            if [ -n "${prev}" ]; then
              commits="$(gh api "repos/${REPO}/compare/${prev}...${SHA}" --paginate \
                --jq '.commits[] | "* \(.commit.message | split("\n")[0])"' 2>/dev/null || true)"
            else
              commits=""
            fi
            notes="## What's Changed"$'\n\n'
            if [ -n "${commits}" ]; then
              notes+="${commits}"$'\n\n'
            fi
            if [ -n "${prev}" ]; then
              notes+="**Full Changelog**: https://github.com/${REPO}/compare/${prev}...${TAG}"
            else
              notes+="**Tag**: https://github.com/${REPO}/releases/tag/${TAG}"
            fi
          fi

          notes+=$'\n\n## Downloads\n\n'
          notes+='- `rezeptor-'"${VER}"'.tar.gz` — source package (`tar xf` → `./setup.sh`)'$'\n'
          notes+='- `rezeptor-'"${VER}"'-x86_64.AppImage` — portable app'$'\n'
          notes+='- `SHA256SUMS` — verify with: `sha256sum -c SHA256SUMS`'$'\n'

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${assets[@]}" --clobber
            # Alte Einzel-.sha256 entfernen falls vorhanden
            gh release delete-asset "$TAG" "rezeptor-${VER}-x86_64.AppImage.sha256" --yes 2>/dev/null || true
            gh release edit "$TAG" \
              --title "Rezeptor ${VER}" \
              --notes "$notes" \
              --latest
          else
            gh release create "$TAG" "${assets[@]}" \
              --title "Rezeptor ${VER}" \
              --notes "$notes" \
              --latest \
              --target "$SHA"
          fi

          echo "Published ${TAG} with:"
          gh release view "$TAG" --json assets -q '.assets[].name'
