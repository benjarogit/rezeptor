name: Release

# Auslöser: NUR manuell (workflow_dispatch).
# Kein Auto-Release bei VERSION-Push/Tag — erst wenn lokal verifiziert.
#
# Assets pro Release:
#   - rezeptor-X.Y.Z.tar.gz
#   - rezeptor-X.Y.Z-x86_64.AppImage
#   - rezeptor-X.Y.Z-x86_64.flatpak
#   - SHA256SUMS
on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Rebuild even if release already has complete assets'
        type: boolean
        default: false

permissions:
  contents: write

# One release pipeline at a time — parallel push+dispatch races delete the
# in-flight release mid-upload (HTTP 404 on assets).
concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  # Never cancel — cancelling mid-flatpak left releases without .flatpak assets
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      skip: ${{ steps.skip.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version / tag
        id: meta
        run: |
          set -euo pipefail
          ver="$(tr -d '[:space:]' < VERSION)"
          if [[ ! "$ver" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9.]+)?$ ]]; then
            echo "VERSION invalid: '$ver'" >&2
            exit 1
          fi
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            tag="${GITHUB_REF_NAME}"
            tag_ver="${tag#v}"
            if [ "$ver" != "$tag_ver" ]; then
              echo "VERSION ($ver) != tag ($tag_ver)" >&2
              exit 1
            fi
          else
            tag="v${ver}"
          fi
          echo "version=${ver}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Release target: ${tag} (VERSION ${ver})"

      - name: Skip if complete assets already published
        id: skip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE: ${{ github.event_name == 'workflow_dispatch' && inputs.force }}
          VER: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          tag="${{ steps.meta.outputs.tag }}"
          if [ "${FORCE}" = "true" ]; then
            echo "Force rebuild requested."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          names="$(gh release view "$tag" --json assets -q '.assets[].name' 2>/dev/null || true)"
          need_app="rezeptor-${VER}-x86_64.AppImage"
          need_tar="rezeptor-${VER}.tar.gz"
          need_sum="SHA256SUMS"
          ok=true
          echo "$names" | grep -qxF "$need_app" || ok=false
          echo "$names" | grep -qxF "$need_tar" || ok=false
          echo "$names" | grep -qxF "$need_sum" || ok=false
          if [ "$ok" = true ]; then
            echo "Release ${tag} already complete — skip."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Missing assets (need AppImage + tar.gz + SHA256SUMS) — build."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install tools
        if: steps.skip.outputs.skip != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck bats python3-yaml

      - name: Shellcheck
        if: steps.skip.outputs.skip != 'true'
        run: make shellcheck

      - name: Bash syntax
        if: steps.skip.outputs.skip != 'true'
        run: make syntax

      - name: Python compile
        if: steps.skip.outputs.skip != 'true'
        run: make compile

      - name: Recipe structure
        if: steps.skip.outputs.skip != 'true'
        run: make recipes-check

      - name: Recipe lint
        if: steps.skip.outputs.skip != 'true'
        run: make recipe-lint

      - name: Recipe manifest
        if: steps.skip.outputs.skip != 'true'
        run: make recipe-manifest-check

      - name: Bats tests
        if: steps.skip.outputs.skip != 'true'
        run: make test

  release:
    needs: validate
    if: needs.validate.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            curl tar rsync fuse libfuse2 cabextract \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 \
            libxcb-cursor0 libfontconfig1
          mkdir -p .cache/appimagetool
          curl -fsSL -o .cache/appimagetool/appimagetool-x86_64.AppImage \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x .cache/appimagetool/appimagetool-x86_64.AppImage

      - name: Build source package (tar.gz)
        run: |
          set -euo pipefail
          chmod +x scripts/build-release-package.sh
          scripts/build-release-package.sh
          test -f "rezeptor-${{ needs.validate.outputs.version }}.tar.gz"

      - name: Build AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          set -euo pipefail
          chmod +x scripts/build-appimage.sh AppDir/AppRun
          scripts/build-appimage.sh
          shopt -s nullglob
          files=(rezeptor-*-x86_64.AppImage)
          if [ "${#files[@]}" -ne 1 ]; then
            echo "Expected exactly one AppImage, got: ${#files[@]}" >&2
            ls -la rezeptor-*.AppImage 2>/dev/null || true
            exit 1
          fi
          ls -lh "${files[0]}"

      - name: Verify AppImage Python bundle
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          set -euo pipefail
          chmod +x scripts/verify-appimage-bundle.sh
          shopt -s nullglob
          files=(rezeptor-*-x86_64.AppImage)
          scripts/verify-appimage-bundle.sh "${files[0]}"

      - name: Write SHA256SUMS
        run: |
          set -euo pipefail
          ver="${{ needs.validate.outputs.version }}"
          # SHA256 (stärker als MD5) — prüfen mit: sha256sum -c SHA256SUMS
          sha256sum \
            "rezeptor-${ver}.tar.gz" \
            "rezeptor-${ver}-x86_64.AppImage" \
            | tee SHA256SUMS
          cat SHA256SUMS

      - name: Publish GitHub Release + notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.validate.outputs.tag }}
          VER: ${{ needs.validate.outputs.version }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          assets=(
            "rezeptor-${VER}.tar.gz"
            "rezeptor-${VER}-x86_64.AppImage"
            "SHA256SUMS"
          )
          for f in "${assets[@]}"; do
            [ -f "$f" ] || { echo "Missing $f" >&2; exit 1; }
          done

          prev="$(gh release list --limit 20 --json tagName,isLatest \
            -q "[.[] | select(.tagName != \"${TAG}\")][0].tagName" 2>/dev/null || true)"
          if [ -z "${prev}" ]; then
            prev="$(git describe --tags --abbrev=0 "${SHA}^" 2>/dev/null || true)"
          fi

          notes="$(gh api "repos/${REPO}/releases/generate-notes" \
            -f tag_name="$TAG" \
            -f target_commitish="$SHA" \
            ${prev:+-f previous_tag_name="$prev"} \
            --jq .body 2>/dev/null || true)"
          # Keep changelog headers bilingual (GitHub generate-notes is EN-only).
          notes="${notes//## What's Changed/## What's Changed \/ Änderungen}"
          notes="${notes//\*\*Full Changelog\*\*/\*\*Full Changelog \/ Vollständiger Changelog\*\*}"

          if [ -z "${notes}" ] || [ "${#notes}" -lt 120 ]; then
            if [ -n "${prev}" ]; then
              commits="$(gh api "repos/${REPO}/compare/${prev}...${SHA}" --paginate \
                --jq '.commits[] | "* \(.commit.message | split("\n")[0])"' 2>/dev/null || true)"
            else
              commits=""
            fi
            notes="## What's Changed / Änderungen"$'\n\n'
            if [ -n "${commits}" ]; then
              notes+="${commits}"$'\n\n'
            fi
            if [ -n "${prev}" ]; then
              notes+="**Full Changelog / Vollständiger Changelog**: https://github.com/${REPO}/compare/${prev}...${TAG}"
            else
              notes+="**Tag**: https://github.com/${REPO}/releases/tag/${TAG}"
            fi
          fi

          notes+=$'\n\n## Downloads\n\n'
          notes+='- `rezeptor-'"${VER}"'.tar.gz` — source package / Quellpaket (`tar xf` → `./setup.sh`)'$'\n'
          notes+='- `rezeptor-'"${VER}"'-x86_64.AppImage` — portable app / portable App'$'\n'
          notes+='- `rezeptor-'"${VER}"'-x86_64.flatpak` — Flatpak bundle (may follow in a separate upload)'$'\n'
          notes+='- `SHA256SUMS` — verify / prüfen: `sha256sum -c SHA256SUMS`'$'\n'

          # Create release shell first (no assets), then upload with retries.
          # Avoids races where create-with-assets fails mid-upload after a peer deletes the release.
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "Rezeptor ${VER}" \
              --notes "$notes" \
              --latest \
              --target "$SHA" || true
          fi
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            echo "ERROR: release ${TAG} missing after create" >&2
            exit 1
          fi

          uploaded=0
          for attempt in 1 2 3 4 5; do
            if gh release upload "$TAG" "${assets[@]}" --clobber; then
              uploaded=1
              break
            fi
            echo "upload attempt ${attempt} failed — retrying..." >&2
            sleep $((attempt * 3))
            # Peer race may have wiped the release; recreate shell
            if ! gh release view "$TAG" >/dev/null 2>&1; then
              gh release create "$TAG" \
                --title "Rezeptor ${VER}" \
                --notes "$notes" \
                --latest \
                --target "$SHA" || true
            fi
          done
          if [ "$uploaded" -ne 1 ]; then
            echo "ERROR: could not upload assets to ${TAG}" >&2
            exit 1
          fi

          gh release delete-asset "$TAG" "rezeptor-${VER}-x86_64.AppImage.sha256" --yes 2>/dev/null || true
          gh release edit "$TAG" \
            --title "Rezeptor ${VER}" \
            --notes "$notes" \
            --latest

          echo "Published ${TAG} with:"
          gh release view "$TAG" --json assets -q '.assets[].name'

  flatpak:
    needs: [validate, release]
    if: needs.validate.outputs.skip != 'true'
    continue-on-error: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Flatpak builder
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y flatpak flatpak-builder curl rsync cabextract unzip
          flatpak remote-add --if-not-exists --user flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install -y --user flathub \
            org.freedesktop.Platform//25.08 \
            org.freedesktop.Sdk//25.08 \
            org.freedesktop.Platform.Compat.i386//25.08

      - name: Build Flatpak
        run: |
          set -euo pipefail
          chmod +x scripts/build-flatpak.sh flatpak/rezeptor-launch flatpak/build-app.sh
          scripts/build-flatpak.sh
          test -f "rezeptor-${{ needs.validate.outputs.version }}-x86_64.flatpak"

      - name: Upload Flatpak to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.validate.outputs.tag }}
          VER: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          asset="rezeptor-${VER}-x86_64.flatpak"
          gh release upload "$TAG" "$asset" --clobber
          echo "Uploaded ${asset} to ${TAG}"
