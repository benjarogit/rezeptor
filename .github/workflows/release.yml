name: Release

# Auslöser:
#   - VERSION auf main ändern → Validate + AppImage + GitHub Release (Tag vX.Y.Z)
#   - Tag v* pushen (manuell)
#   - workflow_dispatch (Rebuild / Notfall)
#
# Changelog: GitHub „Generate release notes“ (Commits/PRs seit letztem Tag) —
# kein manuelles CHANGELOG.md nötig.
on:
  push:
    branches: [main, master]
    paths: [VERSION]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      force:
        description: 'Rebuild even if release already has assets'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      skip: ${{ steps.skip.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version / tag
        id: meta
        run: |
          set -euo pipefail
          ver="$(tr -d '[:space:]' < VERSION)"
          if [[ ! "$ver" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9.]+)?$ ]]; then
            echo "VERSION invalid: '$ver'" >&2
            exit 1
          fi
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            tag="${GITHUB_REF_NAME}"
            tag_ver="${tag#v}"
            if [ "$ver" != "$tag_ver" ]; then
              echo "VERSION ($ver) != tag ($tag_ver)" >&2
              exit 1
            fi
          else
            tag="v${ver}"
          fi
          echo "version=${ver}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Release target: ${tag} (VERSION ${ver})"

      - name: Skip if AppImage already published
        id: skip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE: ${{ github.event_name == 'workflow_dispatch' && inputs.force }}
        run: |
          set -euo pipefail
          tag="${{ steps.meta.outputs.tag }}"
          if [ "${FORCE}" = "true" ]; then
            echo "Force rebuild requested."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Release ohne Assets (z. B. altes v3.1.0) wird gebaut
          count="$(gh release view "$tag" --json assets -q '.assets | length' 2>/dev/null || echo 0)"
          if [ "${count}" != "0" ] && [ "${count}" != "" ]; then
            echo "Release ${tag} already has ${count} asset(s) — skip."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install tools
        if: steps.skip.outputs.skip != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck bats python3-yaml

      - name: Shellcheck
        if: steps.skip.outputs.skip != 'true'
        run: make shellcheck

      - name: Bash syntax
        if: steps.skip.outputs.skip != 'true'
        run: make syntax

      - name: Python compile
        if: steps.skip.outputs.skip != 'true'
        run: make compile

      - name: Recipe structure
        if: steps.skip.outputs.skip != 'true'
        run: make recipes-check

      - name: Recipe lint
        if: steps.skip.outputs.skip != 'true'
        run: make recipe-lint

      - name: Recipe manifest
        if: steps.skip.outputs.skip != 'true'
        run: make recipe-manifest-check

      - name: Bats tests
        if: steps.skip.outputs.skip != 'true'
        run: make test

  release:
    needs: validate
    if: needs.validate.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            curl tar rsync fuse libfuse2 cabextract \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 \
            libxcb-cursor0 libfontconfig1
          mkdir -p .cache/appimagetool
          curl -fsSL -o .cache/appimagetool/appimagetool-x86_64.AppImage \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x .cache/appimagetool/appimagetool-x86_64.AppImage

      - name: Build AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          set -euo pipefail
          chmod +x scripts/build-appimage.sh AppDir/AppRun
          scripts/build-appimage.sh
          shopt -s nullglob
          files=(rezeptor-*-x86_64.AppImage)
          if [ "${#files[@]}" -ne 1 ]; then
            echo "Expected exactly one AppImage, got: ${#files[@]}" >&2
            ls -la rezeptor-*.AppImage 2>/dev/null || true
            exit 1
          fi
          ls -lh "${files[0]}"
          sha256sum "${files[0]}" | tee "${files[0]}.sha256"

      - name: Publish GitHub Release + notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.validate.outputs.tag }}
          VER: ${{ needs.validate.outputs.version }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(rezeptor-*-x86_64.AppImage rezeptor-*-x86_64.AppImage.sha256)
          if [ "${#files[@]}" -lt 1 ]; then
            echo "No AppImage artifacts" >&2
            exit 1
          fi

          # Vorheriges Tag (für Changelog-Range)
          prev="$(gh release list --limit 20 --json tagName,isLatest \
            -q "[.[] | select(.tagName != \"${TAG}\")][0].tagName" 2>/dev/null || true)"
          if [ -z "${prev}" ]; then
            prev="$(git describe --tags --abbrev=0 "${SHA}^" 2>/dev/null || true)"
          fi

          # 1) GitHub generate-notes (PRs/Conventional, wenn konfiguriert)
          notes="$(gh api "repos/${REPO}/releases/generate-notes" \
            -f tag_name="$TAG" \
            -f target_commitish="$SHA" \
            ${prev:+-f previous_tag_name="$prev"} \
            --jq .body 2>/dev/null || true)"

          # 2) Fallback: Commit-Liste über Compare-API (immer via GitHub)
          if [ -z "${notes}" ] || [ "${#notes}" -lt 120 ]; then
            range="${prev:+${prev}...}${TAG}"
            if [ -n "${prev}" ]; then
              commits="$(gh api "repos/${REPO}/compare/${prev}...${SHA}" --paginate \
                --jq '.commits[] | "* \(.commit.message | split("\n")[0])"' 2>/dev/null || true)"
            else
              commits=""
            fi
            notes="## What's Changed"$'\n\n'
            if [ -n "${commits}" ]; then
              notes+="${commits}"$'\n\n'
            fi
            if [ -n "${prev}" ]; then
              notes+="**Full Changelog**: https://github.com/${REPO}/compare/${prev}...${TAG}"
            else
              notes+="**Tag**: https://github.com/${REPO}/releases/tag/${TAG}"
            fi
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${files[@]}" --clobber
            gh release edit "$TAG" \
              --title "Rezeptor ${VER}" \
              --notes "$notes" \
              --latest
          else
            gh release create "$TAG" "${files[@]}" \
              --title "Rezeptor ${VER}" \
              --notes "$notes" \
              --latest \
              --target "$SHA"
          fi

          echo "Published ${TAG} with:"
          gh release view "$TAG" --json assets -q '.assets[].name'
